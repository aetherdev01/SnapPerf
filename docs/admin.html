<!DOCTYPE html><html lang="id" data-theme="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SnapPerf Admin</title><meta name="robots" content="noindex,nofollow"/><meta http-equiv="X-Frame-Options" content="DENY"/><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.github.com https://*.supabase.co https://raw.githubusercontent.com; frame-ancestors 'none'"/><link rel="icon" href="assets/aether.webp" type="image/webp"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"/><script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('sp-theme')||'dark');})()</script><style>
:root{--font:'Outfit',-apple-system,sans-serif;--bg:#080b18;--bg2:#0d1025;--bg3:#12162e;--text:#e8eaf6;--text2:#8890bb;--text3:#454a6e;--glass:rgba(14,18,40,.68);--glass2:rgba(18,23,50,.9);--glass-border:rgba(255,255,255,.06);--glass-border2:rgba(255,255,255,.11);--glass-shadow:0 4px 24px rgba(0,0,0,.55);--glass-shadow-lg:0 18px 56px rgba(0,0,0,.68);--accent:#3d88ff;--accent2:#28bce8;--accent3:#00e5b8;--accent-rgb:61,136,255;--accent-soft:rgba(61,136,255,.11);--grad:linear-gradient(135deg,#3d88ff,#28bce8);--r:.85rem;--r-lg:1.2rem;--r-pill:999px;--gold:#ff9f0a;--red:#ff375f;--green:#00e5b8}
[data-theme="light"]{--bg:#f0f2f7;--bg2:#e6e9f2;--bg3:#d8dce8;--text:#0d1120;--text2:#3d4263;--text3:#7c82a3;--glass:rgba(255,255,255,.62);--glass2:rgba(255,255,255,.84);--glass-border:rgba(255,255,255,.6);--glass-border2:rgba(255,255,255,.88);--glass-shadow:0 4px 20px rgba(30,50,120,.07);--glass-shadow-lg:0 14px 44px rgba(30,50,120,.12);--accent:#1a6bff;--accent-rgb:26,107,255;--accent-soft:rgba(26,107,255,.08);--grad:linear-gradient(135deg,#1a6bff,#0fa8e0)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}
code{background:var(--accent-soft);color:var(--accent);padding:.1rem .35rem;border-radius:.3rem;font-size:.82em;font-family:monospace}

#sp-lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden}
#sp-lock::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 20%,rgba(61,136,255,.12),transparent),radial-gradient(ellipse 50% 50% at 85% 80%,rgba(0,229,184,.08),transparent);pointer-events:none}
.lock-card{background:var(--glass2);border:1px solid var(--glass-border2);border-radius:2rem;padding:2.2rem 2rem 1.8rem;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3),0 0 0 .5px rgba(255,255,255,.07) inset;text-align:center;animation:lockCardIn .5s cubic-bezier(.34,1.56,.64,1) both;position:relative;overflow:hidden}
.lock-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 55%);pointer-events:none;border-radius:inherit}
@keyframes lockCardIn{from{transform:translateY(28px) scale(.94);opacity:0}to{transform:none;opacity:1}}
.lock-header{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1.5rem;position:relative;z-index:1}
.lock-logo{width:60px;height:60px;border-radius:1.2rem;overflow:hidden;border:2px solid var(--glass-border2);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.lock-logo img{width:100%;height:100%;object-fit:cover;display:block}
.lock-brand{font-size:1.3rem;font-weight:900;color:var(--text);letter-spacing:-.04em}
.lock-brand span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lock-badge{display:inline-flex;align-items:center;gap:.28rem;background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.28);border-radius:var(--r-pill);padding:.17rem .52rem;font-size:.6rem;font-weight:800;color:var(--gold);letter-spacing:.07em;text-transform:uppercase}
.lock-sub{font-size:.8rem;color:var(--text2);margin-bottom:1.3rem;line-height:1.6;position:relative;z-index:1}
.lock-field{margin-bottom:.85rem;text-align:left;position:relative;z-index:1}
.lock-field-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.35rem;display:block}
.lock-inp-wrap{position:relative;display:flex;align-items:center}
.lock-inp{width:100%;background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:.9rem;padding:.62rem 2.6rem .62rem .9rem;font-size:.84rem;color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;font-family:var(--font)}
.lock-inp:focus{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.1)}
.lock-inp::placeholder{color:var(--text3)}
.lock-inp.sp-shake{animation:lockShake .35s ease}
@keyframes lockShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.lock-eye{position:absolute;right:.65rem;background:none;border:none;color:var(--text3);padding:.25rem;display:flex;align-items:center;transition:color .15s;cursor:pointer}
.lock-eye:hover{color:var(--accent)}
.lock-submit{width:100%;padding:.7rem;border-radius:.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-size:.88rem;font-weight:800;font-family:var(--font);cursor:pointer;transition:opacity .18s,transform .2s cubic-bezier(.34,1.56,.64,1);letter-spacing:.01em;box-shadow:0 4px 16px rgba(61,136,255,.35);position:relative;z-index:1}
.lock-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 6px 22px rgba(61,136,255,.45)}
.lock-submit:active:not(:disabled){transform:scale(.98)}
.lock-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}
.lock-status{font-size:.75rem;font-weight:600;margin-top:.65rem;min-height:1.1rem;transition:color .2s;display:flex;align-items:center;justify-content:center;gap:.32rem;position:relative;z-index:1}
.lock-status.checking{color:var(--accent2)}
.lock-status.err{color:var(--red)}
.lock-status.ok{color:var(--green)}
.lock-hint{margin-top:1.1rem;padding-top:.9rem;border-top:1px solid var(--glass-border);font-size:.7rem;color:var(--text3);line-height:1.55}
.lock-hint a{color:var(--accent);text-decoration:none}
.lock-hint a:hover{text-decoration:underline}
.lock-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;border-radius:0 0 2rem 2rem}
.lock-card.lock-loading .lock-progress{transform:scaleX(.7)}

#sp-app{display:none;flex-direction:column;min-height:100vh}
.adm-sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--glass2);border-right:1px solid var(--glass-border2);display:flex;flex-direction:column;z-index:100;transition:transform .28s cubic-bezier(.16,1,.3,1)}
.adm-logo{display:flex;align-items:center;gap:.55rem;padding:1.2rem 1rem 1rem;border-bottom:1px solid var(--glass-border2)}
.adm-logo img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.adm-logo-name{font-size:.9rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
.adm-logo-badge{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.25);border-radius:var(--r-pill);padding:.1rem .38rem;margin-left:.3rem}
.adm-owner{display:flex;align-items:center;gap:.55rem;padding:.75rem 1rem;margin:.5rem .6rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg)}
.adm-owner-av{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,159,10,.35);flex-shrink:0}
.adm-owner-name{font-size:.75rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-owner-role{font-size:.62rem;color:var(--gold);font-weight:700}
.adm-nav{flex:1;padding:.4rem .6rem;overflow-y:auto}
.adm-nav-item{display:flex;align-items:center;gap:.55rem;padding:.55rem .75rem;border-radius:var(--r);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;margin-bottom:.1rem}
.adm-nav-item svg{flex-shrink:0;opacity:.7}
.adm-nav-item:hover{background:var(--glass);color:var(--text)}
.adm-nav-item.active{background:var(--accent-soft);color:var(--accent)}
.adm-nav-item.active svg{opacity:1}
.adm-nav-sep{height:1px;background:var(--glass-border2);margin:.5rem .2rem}
.adm-nav-logout{color:var(--red)!important}
.adm-nav-logout svg path{stroke:var(--red)}
.adm-nav-logout:hover{background:rgba(255,55,95,.1)!important}

.adm-main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.adm-topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.4rem;border-bottom:1px solid var(--glass-border2);background:var(--glass);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.adm-page-title{font-size:.95rem;font-weight:800;color:var(--text);letter-spacing:-.02em;display:flex;align-items:center;gap:.45rem}
.adm-topbar-right{display:flex;align-items:center;gap:.5rem}
.adm-theme-btn{background:var(--glass);border:1px solid var(--glass-border2);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .18s,color .18s}
.adm-theme-btn:hover{background:var(--accent-soft);color:var(--accent)}
.adm-back-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.32rem .75rem;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border2);color:var(--text2);font-size:.74rem;font-weight:600;transition:background .15s,color .15s}
.adm-back-btn:hover{color:var(--accent);background:var(--accent-soft)}

.adm-content{padding:1.4rem;flex:1}
.adm-page{display:none}
.adm-page.active{display:block}

.adm-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem;margin-bottom:1.4rem}
.adm-stat-card{background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:1rem 1.1rem;position:relative;overflow:hidden}
.adm-stat-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%)}
.adm-stat-num{font-size:1.9rem;font-weight:900;letter-spacing:-.05em;color:var(--text);line-height:1}
.adm-stat-lbl{font-size:.68rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:.28rem}
.adm-stat-icon{position:absolute;right:.9rem;top:.9rem;opacity:.15}

.adm-card{background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:1.1rem 1.2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.adm-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%)}
.adm-card-title{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.85rem;display:flex;align-items:center;gap:.4rem}
.adm-card-title svg{opacity:.7}

.adm-table{width:100%;border-collapse:collapse;font-size:.78rem}
.adm-table th{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:.5rem .7rem;border-bottom:1px solid var(--glass-border2);text-align:left;white-space:nowrap}
.adm-table td{padding:.6rem .7rem;border-bottom:1px solid var(--glass-border);color:var(--text2);vertical-align:top}
.adm-table tr:last-child td{border-bottom:none}
.adm-table tr:hover td{background:rgba(255,255,255,.02)}
.adm-td-name{font-weight:700;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adm-td-tag{display:inline-block;background:var(--accent-soft);color:var(--accent);padding:.1rem .42rem;border-radius:var(--r-pill);font-size:.65rem;font-weight:700;white-space:nowrap}
.adm-td-text{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.adm-td-time{font-size:.68rem;color:var(--text3);white-space:nowrap}

.adm-search-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.9rem;flex-wrap:wrap}
.adm-search{flex:1;min-width:160px;background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.44rem .85rem;font-size:.8rem;color:var(--text);outline:none;transition:border-color .18s}
.adm-search:focus{border-color:rgba(var(--accent-rgb),.4)}
.adm-search::placeholder{color:var(--text3)}

.adm-btn{display:inline-flex;align-items:center;gap:.32rem;padding:.42rem .9rem;border-radius:var(--r-pill);border:none;font-size:.77rem;font-weight:700;transition:background .18s,transform .18s cubic-bezier(.34,1.56,.64,1)}
.adm-btn:hover{transform:scale(1.03)}
.adm-btn:active{transform:scale(.97)}
.adm-btn-primary{background:var(--accent);color:#fff}
.adm-btn-primary:hover{background:#2b78ff}
.adm-btn-ghost{background:var(--glass);border:1px solid var(--glass-border2);color:var(--text2)}
.adm-btn-ghost:hover{color:var(--accent);background:var(--accent-soft);border-color:rgba(var(--accent-rgb),.3)}
.adm-btn-danger{background:rgba(255,55,95,.12);border:1px solid rgba(255,55,95,.25);color:var(--red)}
.adm-btn-danger:hover{background:rgba(255,55,95,.2)}
.adm-btn-warn{background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.25);color:var(--gold)}
.adm-btn-warn:hover{background:rgba(255,159,10,.2)}
.adm-btn-sm{padding:.28rem .62rem;font-size:.7rem}

.adm-chk{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.adm-bulk-bar{display:none;align-items:center;gap:.5rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-pill);padding:.38rem .75rem;margin-bottom:.6rem;font-size:.77rem;color:var(--text2)}
.adm-bulk-bar.visible{display:flex}

.adm-form{display:flex;flex-direction:column;gap:.7rem}
.adm-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.adm-input{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.5rem .88rem;font-size:.82rem;color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;width:100%}
.adm-input:focus{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.09)}
.adm-input::placeholder{color:var(--text3)}
.adm-textarea{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:1rem;padding:.6rem .88rem;font-size:.82rem;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color .18s;-webkit-appearance:none;width:100%;line-height:1.55}
.adm-textarea:focus{border-color:rgba(var(--accent-rgb),.5)}
.adm-textarea::placeholder{color:var(--text3)}
.adm-select{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.5rem .88rem;font-size:.82rem;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%}
.adm-toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;font-weight:600;color:var(--text2)}
.adm-toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.adm-toggle input{opacity:0;width:0;height:0}
.adm-toggle-sl{position:absolute;inset:0;background:var(--text3);border-radius:var(--r-pill);cursor:pointer;transition:.22s}
.adm-toggle-sl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.22s}
.adm-toggle input:checked+.adm-toggle-sl{background:var(--accent)}
.adm-toggle input:checked+.adm-toggle-sl::before{transform:translateX(18px)}
.adm-actions{display:flex;gap:.45rem;flex-wrap:wrap;padding-top:.3rem}
.adm-status{font-size:.74rem;font-weight:600;min-height:1.1rem;transition:color .2s}
.adm-status.ok{color:var(--green)}
.adm-status.err{color:var(--red)}
.adm-status.checking{color:var(--accent2)}

.adm-notif-preview{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;border-radius:var(--r-pill);border:1px solid var(--glass-border2);background:var(--glass);margin-top:.4rem}
.adm-notif-preview[data-type="success"]{border-color:rgba(0,229,184,.3)}
.adm-notif-preview[data-type="warning"]{border-color:rgba(255,159,10,.3)}
.adm-notif-preview[data-type="alert"]{border-color:rgba(255,55,95,.3)}
.adm-notif-preview[data-type="info"]{border-color:rgba(61,136,255,.28)}
.adm-preview-msg{font-size:.8rem;font-weight:600;color:var(--text)}

.adm-release-list{display:flex;flex-direction:column;gap:.55rem}
.adm-rel-item{display:flex;align-items:center;gap:.7rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:.7rem .9rem}
.adm-rel-tag{font-size:.8rem;font-weight:800;color:var(--text);flex-shrink:0;min-width:80px}
.adm-rel-name{flex:1;font-size:.77rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adm-rel-date{font-size:.67rem;color:var(--text3);flex-shrink:0}
.adm-rel-dl{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:.22rem;flex-shrink:0}

.adm-token-wrap{position:relative;display:flex;align-items:center}
.adm-token-wrap .adm-input{padding-right:2.5rem}
.adm-token-eye{position:absolute;right:.7rem;background:none;border:none;color:var(--text3);padding:.2rem;display:flex;align-items:center;transition:color .15s}
.adm-token-eye:hover{color:var(--accent)}

.adm-owner-card{display:flex;align-items:center;gap:.75rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:.85rem 1rem}
.adm-owner-card-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,159,10,.38);flex-shrink:0}

.adm-loading{display:flex;align-items:center;gap:.55rem;color:var(--text3);font-size:.8rem;padding:1.4rem 0}
.adm-spin{width:18px;height:18px;border:2px solid var(--glass-border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.adm-empty{color:var(--text3);font-size:.8rem;padding:1.2rem 0;text-align:center}
.adm-err{color:var(--red);font-size:.78rem;padding:.6rem 0}

.sp-toast{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%) translateY(22px);z-index:99999;padding:.52rem 1.1rem;border-radius:var(--r-pill);font-size:.79rem;font-weight:700;backdrop-filter:blur(20px);border:1px solid;opacity:0;transition:opacity .22s,transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.sp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sp-toast.ok{background:rgba(0,229,184,.18);color:var(--green);border-color:rgba(0,229,184,.35)}
.sp-toast.err{background:rgba(255,55,95,.15);color:var(--red);border-color:rgba(255,55,95,.3)}

@media(max-width:700px){
  .adm-sidebar{transform:translateX(-100%);width:240px}
  .adm-sidebar.mob-open{transform:translateX(0)}
  .adm-main{margin-left:0}
  .adm-mob-toggle{display:flex!important}
  .adm-stats-grid{grid-template-columns:repeat(2,1fr)}
  .adm-table{font-size:.73rem}
  .adm-td-text{max-width:120px}
}
.adm-mob-toggle{display:none;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-pill);padding:.3rem .55rem;color:var(--text2);align-items:center;gap:.3rem;font-size:.75rem;font-weight:700;cursor:pointer}
.adm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;backdrop-filter:blur(4px)}
.adm-overlay.visible{display:block}
</style></head>
<body>
<div id="sp-lock">
  <div class="lock-card" id="lock-card">
    <div class="lock-header">
      <div class="lock-logo"><img src="assets/aether.webp" alt="SnapPerf"/></div>

/* ── Helpers ──────────────────────────────────── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function relTime(ts){if(!ts)return'—';var d=new Date(ts);if(isNaN(d.getTime()))return'—';var s=(Date.now()-d.getTime())/1000;if(s<60)return Math.floor(s)+'d lalu';if(s<3600)return Math.floor(s/60)+'m lalu';if(s<86400)return Math.floor(s/3600)+'j lalu';return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}
function fullDate(ts){if(!ts)return'';var d=new Date(ts);if(isNaN(d.getTime()))return'';return d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtDur(ms){if(!ms||ms<0)return'—';var s=Math.floor(ms/1000);if(s<60)return s+'d';var m=Math.floor(s/60);if(m<60)return m+' menit';var h=Math.floor(m/60);if(h<24)return h+' jam '+Math.floor(m%60)+'m';var day=Math.floor(h/24);if(day<30)return day+' hari';var mo=Math.floor(day/30.44);return mo+' bulan '+Math.floor(day%30.44)+' hari';}
function decodeJWT(t){try{var p=t.split('.');if(p.length!==3)return null;return JSON.parse(atob(p[1].replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}

function toast(msg,ok){document.querySelectorAll('.sp-toast').forEach(function(t){t.remove();});var t=document.createElement('div');t.className='sp-toast '+(ok?'ok':'err');t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(function(){t.classList.add('show');});setTimeout(function(){t.classList.remove('show');t.addEventListener('transitionend',function(){if(t.parentNode)t.remove();},{once:true});},2800);}

function saveToken(t){localStorage.setItem(SP_TOKEN_KEY,t);if(!localStorage.getItem(SP_FIRST_LOGIN_KEY))localStorage.setItem(SP_FIRST_LOGIN_KEY,Date.now());localStorage.setItem(SP_TOKEN_SAVED_KEY,Date.now());}

function saveTokenMeta(m){try{localStorage.setItem(SP_TOKEN_META_KEY,JSON.stringify(m));}catch(e){}}
function loadTokenMeta(){try{var m=localStorage.getItem(SP_TOKEN_META_KEY);return m?JSON.parse(m):null;}catch(e){return null;}}

function ghHeaders(){return{'Authorization':'Bearer '+spToken,'Accept':'application/vnd.github.v3+json'};}

/* ── Verify Token ──────────────────────────────── */
async function verifyToken(token){
  try{
    var r=await fetch('https://api.github.com/user',{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok)return null;
    var expiry=r.headers.get('github-authentication-token-expiration')||null;
    var rateRemain=parseInt(r.headers.get('x-ratelimit-remaining')||'60',10);
    var rateReset=parseInt(r.headers.get('x-ratelimit-reset')||'0',10)*1000;
    var rateLimit=parseInt(r.headers.get('x-ratelimit-limit')||'60',10);
    var d=await r.json();
    if((d.login||'').toLowerCase()!==SP_OWN_GH.toLowerCase())return null;
    var meta={expiry:expiry,rateRemain:rateRemain,rateReset:rateReset,rateLimit:rateLimit,verifiedAt:Date.now()};
    saveTokenMeta(meta);
    return{name:d.name||d.login,login:d.login,avatar:d.avatar_url||'',bio:d.bio||'',followers:d.followers||0,public_repos:d.public_repos||0,created_at:d.created_at||null,meta:meta};
  }catch(e){return null;}
}

  if(spCurPage==='stats'){spNewCmtCount=0;return;}

}

/* ── Init App ──────────────────────────────────── */
async function initApp(token,ownerData){
  spToken=token;spOwner=ownerData;
  if(typeof window.supabase!=='undefined')try{spSb=window.supabase.createClient(SP_SB_URL,SP_SB_ANON);}catch(e){}
  document.getElementById('sp-lock').style.display='none';
  var app=document.getElementById('sp-app');app.style.display='flex';
  var oi=document.getElementById('adm-owner-info');
  oi.innerHTML=(ownerData.avatar?'<img class="adm-owner-av" src="'+esc(ownerData.avatar)+'" alt=""/>':'')
    +'<div><div class="adm-owner-name">'+esc(ownerData.name)+'</div><div class="adm-owner-role">@'+esc(ownerData.login)+'</div></div>';
  // Setup global realtime
  if(spSb){
    try{
      spRTCh=spSb.channel('adm_global_rt')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'sp_comments'},function(){
          incStatsBadge();
          if(spCurPage==='stats')renderStats();
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'sp_comments'},function(){
          if(spCurPage==='stats'||spCurPage==='mod'){if(spCurPage==='stats')renderStats();else renderMod();}
        })
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'sp_likes'},function(){
          if(spCurPage==='stats')renderStats();
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'sp_likes'},function(){
          if(spCurPage==='stats')renderStats();
        })
        .subscribe(function(status){setRTDot(status==='SUBSCRIBED');});
    }catch(e){}
  }
  setPage('stats');

/* ── CSV Export ──────────────────────────────── */
async function exportCSV(){
  if(!spSb){toast('Supabase tidak tersambung',false);return;}
  try{
    var r=await spSb.from('sp_comments').select('*').order('created_at',{ascending:false}).limit(1000);
    if(r.error)throw r.error;
    if(!r.data||!r.data.length){toast('Tidak ada komentar',false);return;}
    var cols=['id','release_tag','display_name','is_anonymous','text','created_at','user_id'];
    var lines=[cols.join(',')];
    r.data.forEach(function(d){
      lines.push(cols.map(function(k){
        var v=d[k]===null||d[k]===undefined?'':String(d[k]);
        if(v.indexOf(',')>-1||v.indexOf('"')>-1||v.indexOf('\n')>-1)v='"'+v.replace(/"/g,'""')+'"';
        return v;
      }).join(','));
    });
    var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='snapperf_comments_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('\u2713 CSV diekspor ('+r.data.length+' baris)',true);
  }catch(e){toast('\u2717 Export gagal: '+(e.message||''),false);}
}

    +'<div><div class="adm-label" style="margin-bottom:.35rem">Pesan</div><textarea class="adm-textarea" id="notif-msg" placeholder="Tulis pesan pengumuman...">'+esc(curMsg)+'</textarea></div>'
    +'<div><div class="adm-label" style="margin-bottom:.35rem">Tipe</div><select class="adm-select" id="notif-type">'+typeOpts+'</select></div>'
    +'<div class="adm-toggle-row"><span>Status Aktif</span><label class="adm-toggle"><input type="checkbox" id="notif-active"'+(curActive?' checked':'')+'><span class="adm-toggle-sl"></span></label></div>'
    +'<div><div class="adm-label" style="margin-bottom:.35rem">Preview</div><div class="adm-notif-preview" id="notif-preview" data-type="'+curType+'"><span id="notif-prev-ico">ℹ️</span><span class="adm-preview-msg" id="notif-prev-msg">'+(curMsg||'Pesan akan tampil di sini...')+'</span></div></div>'
    +'<div class="adm-actions"><button class="adm-btn adm-btn-primary" id="notif-send">Kirim Pengumuman</button><button class="adm-btn adm-btn-ghost" id="notif-off">Nonaktifkan</button></div>'
    +'<div class="adm-status" id="notif-st"></div>'
    +'</div></div>';
  var icons={info:'ℹ️',success:'✅',warning:'⚠️',alert:'🚨'};
  function updatePreview(){var msg=document.getElementById('notif-msg').value.trim()||'Pesan akan tampil di sini...';var type=document.getElementById('notif-type').value;document.getElementById('notif-prev-msg').textContent=msg;document.getElementById('notif-prev-ico').textContent=icons[type]||'ℹ️';document.getElementById('notif-preview').setAttribute('data-type',type);}
  document.getElementById('notif-msg').addEventListener('input',updatePreview);
  document.getElementById('notif-type').addEventListener('change',updatePreview);
  async function pushNotif(msg,type,active){
    var st=document.getElementById('notif-st');if(st){st.className='adm-status checking';st.textContent='Mengirim ke GitHub...';}
    try{
      var getR=await fetch(SP_GH_NOTIF,{headers:ghHeaders()});if(!getR.ok)throw new Error('Gagal ambil file ('+getR.status+')');
      var gd=await getR.json();var sha=gd.sha;
      var title=document.getElementById('notif-title')?document.getElementById('notif-title').value.trim():'';
      var payload={active:active,id:active?'notif_'+Date.now():'notif_default',type:type||'info',title:title,message:msg,timestamp:Date.now()};
      var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
      var putR=await fetch(SP_GH_NOTIF,{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),body:JSON.stringify({message:active?'chore: push notification [skip ci]':'chore: clear notification [skip ci]',content:encoded,sha:sha})});
      if(!putR.ok)throw new Error('Gagal update ('+putR.status+')');
      if(st){st.className='adm-status ok';st.textContent='\u2713 Berhasil! Aktif dalam ~30 detik.';}
      toast('\u2713 Pengumuman berhasil dikirim!',true);
    }catch(e){if(st){st.className='adm-status err';st.textContent='\u2717 '+e.message;}toast('\u2717 Gagal: '+e.message,false);}
  }
  document.getElementById('notif-send').addEventListener('click',function(){var msg=document.getElementById('notif-msg').value.trim();var type=document.getElementById('notif-type').value;var active=document.getElementById('notif-active').checked;if(!msg){toast('Pesan tidak boleh kosong',false);return;}pushNotif(msg,type,active);});
  document.getElementById('notif-off').addEventListener('click',function(){pushNotif('',null,false);});
}

      html+='<tr><td class="adm-td-name">'+esc(rel.tag_name)+'</td><td class="adm-td-text">'+esc(rel.name||'')+'</td><td>'+badge+'</td><td class="adm-td-time">'+dlCount+' ↓</td><td class="adm-td-time">'+relTime(rel.published_at)+'</td><td><a href="'+esc(rel.html_url)+'" target="_blank" class="adm-btn adm-btn-ghost adm-btn-sm">GitHub</a></td></tr>';
    });
    html+='</tbody></table></div>';
    var updateJsonUrl='https://api.github.com/repos/'+SP_GH_REPO+'/contents/server/update.json';
    var curVer='',curDirect='',curMirror='',curCl='';
    try{var ujr=await fetch(updateJsonUrl,{headers:ghHeaders()});if(ujr.ok){var ujd=await ujr.json();var ujc=JSON.parse(atob(ujd.content.replace(/\n/g,'')));curVer=ujc.version||'';curDirect=ujc.urlZip||ujc.zipUrl||'';curMirror=ujc.link||'';curCl=ujc.changelog||'';}}catch(e){}
    html+='<div class="adm-card"><div class="adm-card-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Edit update.json</div>'
      +'<p style="font-size:.78rem;color:var(--text3);margin-bottom:.9rem">Update versi &amp; link download yang ditampilkan di website.</p>'
      +'<div class="adm-form">'
      +'<div><div class="adm-label" style="margin-bottom:.3rem">Versi</div><input class="adm-input" id="rel-ver" type="text" placeholder="v1.5.3 (Stable)" value="'+esc(curVer)+'"/></div>'
      +'<div><div class="adm-label" style="margin-bottom:.3rem">Direct Link</div><input class="adm-input" id="rel-direct" type="text" placeholder="https://github.com/.../SnapPerf.zip" value="'+esc(curDirect)+'"/></div>'
      +'<div><div class="adm-label" style="margin-bottom:.3rem">Mirror Link</div><input class="adm-input" id="rel-mirror" type="text" placeholder="https://safefileku.com/..." value="'+esc(curMirror)+'"/></div>'
      +'<div><div class="adm-label" style="margin-bottom:.3rem">URL Changelog</div><input class="adm-input" id="rel-cl" type="text" placeholder="https://raw.githubusercontent.com/.../CHANGELOG.md" value="'+esc(curCl)+'"/></div>'
      +'<div class="adm-actions"><button class="adm-btn adm-btn-primary" id="rel-save"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Simpan update.json</button></div>'
      +'<div class="adm-status" id="rel-st"></div>'
      +'</div></div>';
    pg.innerHTML=html;
    document.getElementById('rel-save').addEventListener('click',async function(){
      var ver=document.getElementById('rel-ver').value.trim();var direct=document.getElementById('rel-direct').value.trim();var mirror=document.getElementById('rel-mirror').value.trim();var cl=document.getElementById('rel-cl').value.trim();
      var st=document.getElementById('rel-st');if(!ver||(!direct&&!mirror)){toast('Versi dan minimal satu URL wajib diisi',false);return;}
      if(st){st.className='adm-status checking';st.textContent='Mengupdate...';}
      try{
        var apiUrl='https://api.github.com/repos/'+SP_GH_REPO+'/contents/server/update.json';
        var getR=await fetch(apiUrl,{headers:ghHeaders()});if(!getR.ok)throw new Error('Gagal ambil file ('+getR.status+')');
        var gd=await getR.json();var sha=gd.sha;
        var cur={};try{cur=JSON.parse(atob(gd.content.replace(/\n/g,'')));}catch(e){}
        var payload={version:ver,versionCode:ver.replace(/\D/g,'').slice(0,5),urlZip:direct||(cur.urlZip||cur.zipUrl||''),link:mirror||(cur.link||''),changelog:cl||cur.changelog||''};
        var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
        var putR=await fetch(apiUrl,{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),body:JSON.stringify({message:'chore: update version to '+ver+' [skip ci]',content:encoded,sha:sha})});
        if(!putR.ok)throw new Error('Gagal update ('+putR.status+')');
        if(st){st.className='adm-status ok';st.textContent='\u2713 update.json berhasil diupdate!';}toast('\u2713 Versi diupdate ke '+ver,true);
      }catch(e){if(st){st.className='adm-status err';st.textContent='\u2717 '+e.message;}toast('\u2717 Gagal: '+e.message,false);}
    });
  }catch(e){pg.innerHTML='<div class="adm-err">Gagal memuat rilis: '+esc(e.message||'')+'</div>';}
}

/* ── renderLicense ──────────────────────────── */
async function renderLicense(){
  var pg=document.getElementById('page-license');
  pg.innerHTML='<div class="adm-loading"><div class="adm-spin"></div>Memuat info lisensi &amp; session...</div>';
  var now=Date.now();
  var tokenSaved=parseInt(localStorage.getItem(SP_TOKEN_SAVED_KEY)||'0',10);
  var firstLogin=parseInt(localStorage.getItem(SP_FIRST_LOGIN_KEY)||tokenSaved||'0',10);
  var meta=loadTokenMeta();
  var sbJwt=decodeJWT(SP_SB_ANON);
  var sbExpMs=sbJwt&&sbJwt.exp?(sbJwt.exp*1000):null;
  var sbIatMs=sbJwt&&sbJwt.iat?(sbJwt.iat*1000):null;

  // Refresh rate limit via /rate_limit endpoint
  try{
    var chkR=await fetch('https://api.github.com/rate_limit',{headers:ghHeaders()});
    if(chkR.ok){
      var chkD=await chkR.json();var core=chkD.resources&&chkD.resources.core;
      if(core){meta={rateRemain:core.remaining,rateLimit:core.limit,rateReset:core.reset*1000,verifiedAt:now,expiry:meta?meta.expiry:null};saveTokenMeta(meta);}
    }
  }catch(e){}

  // Supabase row counts
  var sbCmtCount=0,sbLikeCount=0,sbConnected=false;
  try{
    var sc=await spSb.from('sp_comments').select('id',{count:'exact',head:true});
    var sl=await spSb.from('sp_likes').select('user_id',{count:'exact',head:true});
    sbCmtCount=sc.count||0;sbLikeCount=sl.count||0;sbConnected=true;
  }catch(e){}

  // GitHub repo info
  var ghStars=0,ghForks=0,ghOpenIssues=0;
  try{var gr=await fetch('https://api.github.com/repos/'+SP_GH_REPO,{headers:ghHeaders()});if(gr.ok){var gd=await gr.json();ghStars=gd.stargazers_count||0;ghForks=gd.forks_count||0;ghOpenIssues=gd.open_issues_count||0;}}catch(e){}

  function row(lbl,val,extra){return'<div class="adm-info-row"><span class="adm-info-lbl">'+lbl+'</span><span class="adm-info-val">'+val+(extra?'<span class="adm-info-extra">'+extra+'</span>':'')+'</span></div>';}
  function badge(ok,yes,no){return ok?'<span class="adm-badge-ok">\u2713 '+yes+'</span>':'<span class="adm-badge-err">\u2717 '+no+'</span>';}

  // Token expiry
  var expiryHtml;
  if(meta&&meta.expiry){
    var exMs=new Date(meta.expiry).getTime();var exLeft=exMs-now;
    var exStr=new Date(meta.expiry).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
    if(exLeft<0)expiryHtml='<span style="color:var(--red)">\u2717 Kadaluarsa</span>';
    else if(exLeft<7*86400000)expiryHtml='<span style="color:var(--gold)">\u26a0 '+exStr+' ('+Math.ceil(exLeft/86400000)+' hari lagi)</span>';
    else expiryHtml='<span style="color:var(--green)">\u2713 '+exStr+' ('+Math.ceil(exLeft/86400000)+' hari lagi)</span>';
  }else{expiryHtml='<span style="color:var(--text3)">Tidak ada batas (no expiry)</span>';}

  var ratePct=meta?(Math.round(meta.rateRemain/meta.rateLimit*100)):100;
  var rateColor=ratePct>50?'var(--green)':ratePct>20?'var(--gold)':'var(--red)';
  var rateResetStr=meta&&meta.rateReset?new Date(meta.rateReset).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):null;

  var sbExpStr=sbExpMs?new Date(sbExpMs).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}):null;
  var sbExpLeft=sbExpMs?(sbExpMs-now):null;
  var sbExpHtml=sbExpStr?('<span style="color:'+(sbExpLeft>30*86400000?'var(--green)':sbExpLeft>0?'var(--gold)':'var(--red)')+'">'+sbExpStr+' ('+(sbExpLeft>0?Math.ceil(sbExpLeft/86400000)+' hari lagi':'Kadaluarsa!')+')</span>'):'—';

    +'<div class="adm-stat-card"><div class="adm-stat-num">'+ghForks+'</div><div class="adm-stat-lbl">Forks</div></div>'
    +'<div class="adm-stat-card"><div class="adm-stat-num">'+ghOpenIssues+'</div><div class="adm-stat-lbl">Open Issues</div></div>'
    +'</div>';

  // GitHub Token
  html+='<div class="adm-card-title" style="margin-bottom:.5rem"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>GitHub Token</div>'
    +'<div class="adm-lic-card">'
    +row('Status',badge(true,'Aktif','Tidak Aktif'))
    +row('Login Pertama',firstLogin?fullDate(firstLogin):'—',firstLogin?'('+fmtDur(now-firstLogin)+' lalu)':'')
    +row('Token Disimpan',tokenSaved?fullDate(tokenSaved):'—',tokenSaved?'('+fmtDur(now-tokenSaved)+' lalu)':'')
    +row('Token Kadaluarsa',expiryHtml)
    +row('Rate Limit API',(meta?meta.rateRemain+' / '+meta.rateLimit:'—'),rateResetStr?'Reset '+rateResetStr:'')
    +(meta?'<div class="adm-prog-wrap"><div class="adm-prog-bar" style="width:'+ratePct+'%;background:'+rateColor+'"></div></div>':'')
    +'</div>';

  html+='<div class="adm-card-title" style="margin:.8rem 0 .5rem"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub Account</div>'
    +'<div class="adm-lic-card">'
    +(spOwner.avatar?'<div style="display:flex;align-items:center;gap:.7rem;padding:.6rem .9rem;border-bottom:1px solid var(--glass-border)"><img src="'+esc(spOwner.avatar)+'" style="width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,159,10,.35)" alt=""/><div><div style="font-weight:800;font-size:.88rem">'+esc(spOwner.name)+'</div>'+(spOwner.bio?'<div style="font-size:.72rem;color:var(--text3)">'+esc(spOwner.bio)+'</div>':'')+'</div></div>':'')
    +row('Login','@'+spOwner.login)
    +row('Followers',spOwner.followers!==undefined?spOwner.followers.toLocaleString():'—')
    +row('Public Repos',spOwner.public_repos!==undefined?spOwner.public_repos.toLocaleString():'—')
    +row('Umur Akun',ghAccAge||'—')
    +'</div>';

  // Supabase
  html+='<div class="adm-card-title" style="margin:.8rem 0 .5rem"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="2"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5" stroke="currentColor" stroke-width="2"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3" stroke="currentColor" stroke-width="2"/></svg>Supabase</div>'

    +row('Koneksi',badge(sbConnected,'Terhubung','Terputus'))
    +row('Project ID','<code>'+esc(SP_SB_URL.replace('https://','').split('.')[0])+'</code>')
    +row('Anon Key Dibuat',sbIatMs?new Date(sbIatMs).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}):'—')
    +row('Anon Key Kadaluarsa',sbExpHtml)
    +row('Total Komentar',sbCmtCount.toLocaleString())
    +row('Total Likes',sbLikeCount.toLocaleString())
    +'<div style="font-size:.68rem;color:var(--text3);padding:.4rem .9rem .6rem">Free tier: 500MB DB · 2M row reads/bulan · 50K inserts/bulan</div>'
    +'</div>';

  // Session
  html+='<div class="adm-card-title" style="margin:.8rem 0 .5rem"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Sesi Ini</div>'
    +'<div class="adm-lic-card">'
    +row('Realtime',badge(spRTConnected,'Live','Offline'))
    +row('Supabase',badge(sbConnected,'Terhubung','Terputus'))
    +row('Terakhir Verifikasi',meta&&meta.verifiedAt?relTime(meta.verifiedAt):'—')
    +'<div style="padding:.5rem .9rem .7rem"><button class="adm-btn adm-btn-ghost adm-btn-sm" id="lic-refresh"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Refresh Info</button></div>'
    +'</div>';

  pg.innerHTML=html;
  document.getElementById('lic-refresh').addEventListener('click',function(){renderLicense();});

    +'<div class="adm-form"><div style="font-size:.78rem;color:var(--text3)">Token tersimpan di browser lokal. Logout untuk menghapusnya.</div>'

  var eye=document.getElementById('set-eye');var tinp=document.getElementById('set-token');
  if(eye&&tinp)eye.addEventListener('click',function(){var s=tinp.type==='password';tinp.type=s?'text':'password';});
  document.getElementById('set-save').addEventListener('click',async function(){
    var t=tinp?tinp.value.trim():'';if(!t)return;
    var st=document.getElementById('set-st');if(st){st.className='adm-status checking';st.textContent='Memverifikasi...';}
    var data=await verifyToken(t);
    if(data){saveToken(t);saveOwner(data);spToken=t;spOwner=data;if(st){st.className='adm-status ok';st.textContent='\u2713 Token valid dan tersimpan.';}toast('\u2713 Token diperbarui',true);}
    else{if(st){st.className='adm-status err';st.textContent='\u2717 Token tidak valid atau bukan akun @'+SP_OWN_GH+'.';}}
  });
  document.getElementById('set-export-csv').addEventListener('click',exportCSV);
  document.getElementById('set-del-likes').addEventListener('click',async function(){
    if(!confirm('Hapus SEMUA likes?'))return;
    var st=document.getElementById('set-db-st');
    try{await spSb.from('sp_likes').delete().neq('release_tag','__none__');if(st){st.className='adm-status ok';st.textContent='\u2713 Semua likes dihapus.';}toast('\u2713 Semua likes dihapus',true);}
    catch(e){if(st){st.className='adm-status err';st.textContent='\u2717 Gagal: '+(e.message||'');}toast('\u2717 Gagal',false);}
  });
  document.getElementById('set-del-all').addEventListener('click',async function(){
    if(!confirm('Hapus SEMUA komentar? Tidak bisa dibatalkan!'))return;if(!confirm('Benar yakin?'))return;
    var st=document.getElementById('set-db-st');if(st){st.className='adm-status checking';st.textContent='Menghapus...';}
    try{await spSb.from('sp_comments').delete().neq('id','00000000-0000-0000-0000-000000000000');if(st){st.className='adm-status ok';st.textContent='\u2713 Semua komentar dihapus.';}toast('\u2713 Semua komentar dihapus',true);}
    catch(e){if(st){st.className='adm-status err';st.textContent='\u2717 Gagal: '+(e.message||'');}toast('\u2717 Gagal',false);}
  });
  document.getElementById('set-logout').addEventListener('click',function(){if(!confirm('Logout?'))return;if(spRTCh&&spSb){try{spSb.removeChannel(spRTCh);}catch(e){}}clearToken();window.location.href='updates.html';});
}

document.addEventListener('click',function(e){
  var del=e.target.closest('.adm-del-cmt');
  if(del){
    var id=del.dataset.id;if(!id)return;
    if(!confirm('Hapus komentar ini?'))return;
    spSb.from('sp_comments').delete().eq('id',id).then(function(r){
      if(r.error){toast('\u2717 Gagal: '+r.error.message,false);}
      else{toast('\u2713 Komentar dihapus',true);var row=del.closest('tr');if(row){row.style.opacity='0';setTimeout(function(){if(row.parentNode)row.remove();},200);}}
    });return;
  }
  var navBtn=e.target.closest('.adm-nav-item[data-page]');
  if(navBtn){setPage(navBtn.dataset.page);return;}
});

/* ── Lock Screen ────────────────────────────── */
(function(){
  var lock=document.getElementById('sp-lock');var inp=document.getElementById('lock-inp');var eye=document.getElementById('lock-eye');var sub=document.getElementById('lock-submit');var st=document.getElementById('lock-status');
  var saved=loadToken();
  if(saved){
    inp.value=saved;st.className='lock-status checking';
    st.innerHTML='<div class="adm-spin" style="width:13px;height:13px;border-width:1.5px"></div> Memverifikasi token tersimpan...';
    sub.disabled=true;var card=document.getElementById('lock-card');if(card)card.classList.add('lock-loading');
    verifyToken(saved).then(function(d){
      if(card)card.classList.remove('lock-loading');
      if(d){initApp(saved,d);}
      else{clearToken();inp.value='';st.className='lock-status err';st.innerHTML='&#x2717; Token kadaluarsa. Masukkan ulang.';sub.disabled=false;}
    });
  }
  eye.addEventListener('click',function(){var s=inp.type==='password';inp.type=s?'text':'password';eye.innerHTML=s?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>';});
  async function doLogin(){
    var t=inp.value.trim();if(!t){inp.classList.add('sp-shake');setTimeout(function(){inp.classList.remove('sp-shake');},400);return;}
    sub.disabled=true;var card=document.getElementById('lock-card');if(card)card.classList.add('lock-loading');
    st.className='lock-status checking';st.innerHTML='<div class="adm-spin" style="width:13px;height:13px;border-width:1.5px"></div> Memverifikasi...';
    var d=await verifyToken(t);
    if(d){if(card)card.classList.remove('lock-loading');saveToken(t);saveOwner(d);initApp(t,d);}
    else{if(card)card.classList.remove('lock-loading');st.className='lock-status err';st.textContent='\u2717 Token tidak valid atau bukan akun @'+SP_OWN_GH+'.';sub.disabled=false;}
  }
  sub.addEventListener('click',doLogin);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doLogin();}});
})();
</script>
