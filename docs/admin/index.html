<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SnapPerf Admin Panel</title>
<meta name="robots" content="noindex,nofollow"/>
<meta http-equiv="X-Frame-Options" content="DENY"/>
<link rel="icon" href="../assets/aether.webp" type="image/webp"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"/>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('sp-theme')||'dark');})()</script>
<style>

:root{--font:'Outfit',-apple-system,sans-serif;--bg:#09080f;--bg2:#100d1c;--bg3:#17132a;--text:#ede8ff;--text2:#9a91bb;--text3:#4e4870;--glass:rgba(20,15,40,.72);--glass2:rgba(26,20,50,.92);--glass-border:rgba(255,255,255,.07);--glass-border2:rgba(255,255,255,.12);--glass-shadow:0 4px 24px rgba(0,0,0,.6);--glass-shadow-lg:0 18px 56px rgba(0,0,0,.72);--accent:#a259ff;--accent2:#7c3aed;--accent3:#00e5b8;--accent-rgb:162,89,255;--accent-soft:rgba(162,89,255,.13);--grad:linear-gradient(135deg,#a259ff,#7c3aed);--r:.85rem;--r-lg:1.2rem;--r-pill:999px;--gold:#ff9f0a;--red:#ff375f;--green:#00e5b8}
[data-theme="light"]{--bg:#f3f0fa;--bg2:#e8e3f5;--bg3:#ddd7f0;--text:#12091f;--text2:#3d2d6b;--text3:#7c72a0;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.88);--glass-border:rgba(255,255,255,.65);--glass-border2:rgba(255,255,255,.9);--glass-shadow:0 4px 20px rgba(80,20,180,.07);--glass-shadow-lg:0 14px 44px rgba(80,20,180,.13);--accent:#7c3aed;--accent-rgb:124,58,237;--accent-soft:rgba(124,58,237,.1);--grad:linear-gradient(135deg,#7c3aed,#5b21b6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}
code{background:var(--accent-soft);color:var(--accent);padding:.1rem .35rem;border-radius:.3rem;font-size:.82em;font-family:monospace}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 50% at 10% 10%,rgba(162,89,255,.15),transparent),radial-gradient(ellipse 50% 55% at 90% 90%,rgba(0,229,184,.08),transparent),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(124,58,237,.07),transparent)}

#sp-lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden}
#sp-lock::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 55% at 20% 20%,rgba(162,89,255,.14),transparent),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(0,229,184,.09),transparent);pointer-events:none}
.lock-card{background:var(--glass2);border:1px solid var(--glass-border2);border-radius:2rem;padding:2.4rem 2.1rem 2rem;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.35),0 0 0 .5px rgba(255,255,255,.08) inset;text-align:center;animation:lockCardIn .5s cubic-bezier(.34,1.56,.64,1) both;position:relative;overflow:hidden}
.lock-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(162,89,255,.08) 0%,transparent 55%);pointer-events:none;border-radius:inherit}
@keyframes lockCardIn{from{transform:translateY(28px) scale(.94);opacity:0}to{transform:none;opacity:1}}
.lock-header{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1.5rem;position:relative;z-index:1}
.lock-logo{width:64px;height:64px;border-radius:1.4rem;overflow:hidden;border:2px solid var(--glass-border2);box-shadow:0 0 0 4px rgba(162,89,255,.15),0 4px 16px rgba(0,0,0,.2)}
.lock-logo img{width:100%;height:100%;object-fit:cover;display:block}
.lock-brand{font-size:1.4rem;font-weight:900;color:var(--text);letter-spacing:-.04em}
.lock-brand span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lock-badge{display:inline-flex;align-items:center;gap:.28rem;background:rgba(255,159,10,.13);border:1px solid rgba(255,159,10,.3);border-radius:var(--r-pill);padding:.18rem .56rem;font-size:.6rem;font-weight:800;color:var(--gold);letter-spacing:.07em;text-transform:uppercase}
.lock-sub{font-size:.8rem;color:var(--text2);margin-bottom:1.4rem;line-height:1.6;position:relative;z-index:1}
.lock-field{margin-bottom:.9rem;text-align:left;position:relative;z-index:1}
.lock-field-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.38rem;display:block}
.lock-inp-wrap{position:relative;display:flex;align-items:center}
.lock-inp{width:100%;background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:.9rem;padding:.65rem 2.7rem .65rem .95rem;font-size:.85rem;color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;font-family:var(--font)}
.lock-inp:focus{border-color:rgba(var(--accent-rgb),.55);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.lock-inp::placeholder{color:var(--text3)}
.lock-inp.sp-shake{animation:lockShake .35s ease}
@keyframes lockShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.lock-eye{position:absolute;right:.68rem;background:none;border:none;color:var(--text3);padding:.28rem;display:flex;align-items:center;transition:color .15s;cursor:pointer}
.lock-eye:hover{color:var(--accent)}
.lock-submit{width:100%;padding:.75rem;border-radius:.95rem;background:linear-gradient(135deg,#a259ff,#7c3aed);color:#fff;border:none;font-size:.88rem;font-weight:800;font-family:var(--font);cursor:pointer;transition:opacity .18s,transform .2s cubic-bezier(.34,1.56,.64,1);letter-spacing:.01em;box-shadow:0 4px 18px rgba(162,89,255,.4);position:relative;z-index:1;margin-top:.2rem}
.lock-submit:hover:not(:disabled){opacity:.92;transform:translateY(-2px);box-shadow:0 8px 26px rgba(162,89,255,.52)}
.lock-submit:active:not(:disabled){transform:scale(.98)}
.lock-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}
.lock-status{font-size:.75rem;font-weight:600;margin-top:.7rem;min-height:1.1rem;transition:color .2s;display:flex;align-items:center;justify-content:center;gap:.34rem;position:relative;z-index:1}
.lock-status.checking{color:var(--accent)}
.lock-status.err{color:var(--red)}
.lock-status.ok{color:var(--green)}
.lock-locked{display:flex;align-items:center;gap:.4rem;justify-content:center;font-size:.78rem;color:var(--red);font-weight:700;margin-top:.5rem;padding:.5rem .8rem;background:rgba(255,55,95,.1);border:1px solid rgba(255,55,95,.25);border-radius:.7rem}
.lock-hint{margin-top:1.2rem;padding-top:.9rem;border-top:1px solid var(--glass-border);font-size:.7rem;color:var(--text3);line-height:1.55}
.lock-hint a{color:var(--accent);text-decoration:none}
.lock-hint a:hover{text-decoration:underline}
.lock-progress{position:absolute;bottom:0;left:0;right:0;height:2.5px;background:var(--grad);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;border-radius:0 0 2rem 2rem}
.lock-card.lock-loading .lock-progress{transform:scaleX(.65)}

#sp-app{display:none;flex-direction:column;min-height:100vh}
.adm-sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--glass2);border-right:1px solid var(--glass-border2);display:flex;flex-direction:column;z-index:100;transition:transform .28s cubic-bezier(.16,1,.3,1)}
.adm-logo{display:flex;align-items:center;gap:.55rem;padding:1.2rem 1rem 1rem;border-bottom:1px solid var(--glass-border2)}
.adm-logo img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.adm-logo-name{font-size:.9rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
.adm-logo-badge{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.25);border-radius:var(--r-pill);padding:.1rem .38rem;margin-left:.3rem}
.adm-owner{display:flex;align-items:center;gap:.55rem;padding:.75rem 1rem;margin:.5rem .6rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg)}
.adm-owner-av{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,159,10,.35);flex-shrink:0}
.adm-owner-name{font-size:.75rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-owner-role{font-size:.62rem;color:var(--gold);font-weight:700}
.adm-nav{flex:1;padding:.4rem .6rem;overflow-y:auto}
.adm-nav-item{display:flex;align-items:center;gap:.55rem;padding:.55rem .75rem;border-radius:var(--r);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;margin-bottom:.1rem}
.adm-nav-item svg{flex-shrink:0;opacity:.7}
.adm-nav-item:hover{background:var(--glass);color:var(--text)}
.adm-nav-item.active{background:var(--accent-soft);color:var(--accent)}
.adm-nav-item.active svg{opacity:1}
.adm-nav-sep{height:1px;background:var(--glass-border2);margin:.5rem .2rem}
.adm-nav-logout{color:var(--red)!important}
.adm-nav-logout:hover{background:rgba(255,55,95,.1)!important}
.adm-rt-row{display:flex;align-items:center;gap:.38rem;padding:.42rem .75rem;font-size:.68rem;font-weight:700;color:var(--text3)}
.adm-rt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text3)}
.adm-rt-on{background:var(--green);box-shadow:0 0 5px var(--green)}
.adm-rt-off{background:var(--red)}
.adm-main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.adm-topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.4rem;border-bottom:1px solid var(--glass-border2);background:var(--glass);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.adm-page-title{font-size:.95rem;font-weight:800;color:var(--text);letter-spacing:-.02em;display:flex;align-items:center;gap:.45rem}
.adm-topbar-right{display:flex;align-items:center;gap:.5rem}
.adm-theme-btn{background:var(--glass);border:1px solid var(--glass-border2);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .18s,color .18s}
.adm-theme-btn:hover{background:var(--accent-soft);color:var(--accent)}
.adm-back-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.32rem .75rem;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border2);color:var(--text2);font-size:.74rem;font-weight:600;transition:background .15s,color .15s}
.adm-back-btn:hover{color:var(--accent);background:var(--accent-soft)}
.adm-content{padding:1.4rem;flex:1;min-width:0;max-width:900px}
.adm-page{display:none}
.adm-page.active{display:block}
.adm-stats-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.2rem}
@media(max-width:860px){.adm-stats-grid4{grid-template-columns:repeat(2,1fr)}}
.adm-stat-card4{background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:.9rem 1rem;position:relative;overflow:hidden}
.adm-stat-card4::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 60%)}
.adm-sc4-blue{border-color:rgba(41,182,246,.25)}
.adm-sc4-red{border-color:rgba(255,55,95,.22)}
.adm-sc4-green{border-color:rgba(0,229,184,.22)}
.adm-sc4-purple{border-color:rgba(162,89,255,.25)}
.adm-sc4-ico{margin-bottom:.4rem;opacity:.6}
.adm-sc4-num{font-size:1.8rem;font-weight:900;letter-spacing:-.05em;color:var(--text);line-height:1}
.adm-sc4-lbl{font-size:.66rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:.22rem}
.adm-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem;margin-bottom:1.2rem}
.adm-stat-card{background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:1rem 1.1rem;position:relative;overflow:hidden}
.adm-stat-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%)}
.adm-stat-num{font-size:1.9rem;font-weight:900;letter-spacing:-.05em;color:var(--text);line-height:1}
.adm-stat-lbl{font-size:.68rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:.28rem}
.adm-stat-icon{position:absolute;right:.9rem;top:.9rem;opacity:.15}
.adm-card{background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-lg);padding:1.1rem 1.2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.adm-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%)}
.adm-card-title{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.85rem;display:flex;align-items:center;gap:.4rem}
.adm-card-title svg{opacity:.7}
.adm-sparkline{display:flex;align-items:flex-end;gap:.4rem;height:80px;padding:.4rem 0}
.adm-spark-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:.22rem}
.adm-spark-bar{background:var(--grad);border-radius:3px 3px 0 0;width:100%;min-height:6px;transition:height .4s cubic-bezier(.34,1.56,.64,1)}
.adm-spark-lbl{font-size:.6rem;color:var(--text3);font-weight:700}
.adm-spark-num{font-size:.62rem;color:var(--text2);font-weight:700}
.adm-ratio-wrap{display:flex;flex-direction:column;gap:.5rem}
.adm-ratio-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--glass);gap:2px}
.adm-ratio-fill{height:100%;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.adm-ratio-anon{background:var(--text3)}
.adm-ratio-named{background:var(--accent)}
.adm-ratio-leg{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--text2);flex-wrap:wrap}
.adm-ratio-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.adm-ratio-dot-anon{background:var(--text3)}
.adm-ratio-dot-named{background:var(--accent)}
.adm-bar-list{display:flex;flex-direction:column;gap:.45rem}
.adm-bar-row{display:flex;align-items:center;gap:.6rem}
.adm-bar-tag{font-size:.72rem;font-weight:700;color:var(--text);min-width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adm-bar-track{flex:1;height:6px;background:var(--glass);border-radius:3px;overflow:hidden}
.adm-bar-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.adm-bar-val{font-size:.7rem;color:var(--text3);font-weight:700;min-width:28px;text-align:right}
.adm-table{width:100%;border-collapse:collapse;font-size:.78rem}
.adm-table th{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:.5rem .7rem;border-bottom:1px solid var(--glass-border2);text-align:left;white-space:nowrap}
.adm-table td{padding:.6rem .7rem;border-bottom:1px solid var(--glass-border);color:var(--text2);vertical-align:top}
.adm-table tr:last-child td{border-bottom:none}
.adm-table tr:hover td{background:rgba(255,255,255,.02)}
.adm-td-name{font-weight:700;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adm-td-tag{display:inline-block;background:var(--accent-soft);color:var(--accent);padding:.1rem .42rem;border-radius:var(--r-pill);font-size:.65rem;font-weight:700;white-space:nowrap}
.adm-td-text{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.adm-td-time{font-size:.68rem;color:var(--text3);white-space:nowrap}
.adm-td-actions{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.adm-search-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.9rem;flex-wrap:wrap}
.adm-search{flex:1;min-width:160px;background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.44rem .85rem;font-size:.8rem;color:var(--text);outline:none;transition:border-color .18s}
.adm-search:focus{border-color:rgba(var(--accent-rgb),.4)}
.adm-search::placeholder{color:var(--text3)}
.adm-btn{display:inline-flex;align-items:center;gap:.32rem;padding:.42rem .9rem;border-radius:var(--r-pill);border:none;font-size:.77rem;font-weight:700;transition:background .18s,transform .18s cubic-bezier(.34,1.56,.64,1);cursor:pointer;font-family:var(--font)}
.adm-btn:hover{transform:scale(1.03)}
.adm-btn:active{transform:scale(.97)}
.adm-btn-primary{background:var(--grad);color:#fff}
.adm-btn-primary:hover{filter:brightness(1.1)}
.adm-btn-ghost{background:var(--glass);border:1px solid var(--glass-border2);color:var(--text2)}
.adm-btn-ghost:hover{color:var(--accent);background:var(--accent-soft);border-color:rgba(var(--accent-rgb),.3)}
.adm-btn-danger{background:rgba(255,55,95,.12);border:1px solid rgba(255,55,95,.25);color:var(--red)}
.adm-btn-danger:hover{background:rgba(255,55,95,.2)}
.adm-btn-warn{background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.25);color:var(--gold)}
.adm-btn-warn:hover{background:rgba(255,159,10,.2)}
.adm-btn-sm{padding:.28rem .62rem;font-size:.7rem}
.adm-mod-reply{display:inline-flex;align-items:center;gap:.28rem;padding:.24rem .52rem;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border2);color:var(--text3);font-size:.68rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s,color .15s}
.adm-mod-reply:hover{color:var(--accent);background:var(--accent-soft)}
.adm-chk{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.adm-bulk-bar{display:none;align-items:center;gap:.5rem;background:var(--glass);border:1px solid var(--glass-border2);border-radius:var(--r-pill);padding:.38rem .75rem;margin-bottom:.6rem;font-size:.77rem;color:var(--text2)}
.adm-bulk-bar.visible{display:flex}
.adm-form{display:flex;flex-direction:column;gap:.7rem}
.adm-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.adm-input{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.5rem .88rem;font-size:.82rem;color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;width:100%}
.adm-input:focus{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.09)}
.adm-input::placeholder{color:var(--text3)}
.adm-textarea{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:1rem;padding:.6rem .88rem;font-size:.82rem;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color .18s;-webkit-appearance:none;width:100%;line-height:1.55}
.adm-textarea:focus{border-color:rgba(var(--accent-rgb),.5)}
.adm-textarea::placeholder{color:var(--text3)}
.adm-select{background:var(--glass);border:1.5px solid var(--glass-border2);border-radius:var(--r-pill);padding:.5rem .88rem;font-size:.82rem;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%}
.adm-toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;font-weight:600;color:var(--text2)}
.adm-toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.adm-toggle input{opacity:0;width:0;height:0}
.adm-toggle-sl{position:absolute;inset:0;background:var(--text3);border-radius:var(--r-pill);cursor:pointer;transition:.22s}
.adm-toggle-sl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.22s}
.adm-toggle input:checked+.adm-toggle-sl{background:var(--accent)}
.adm-toggle input:checked+.adm-toggle-sl::before{transform:translateX(18px)}
.adm-actions{display:flex;gap:.45rem;flex-wrap:wrap;padding-top:.3rem}
.adm-status{font-size:.74rem;font-weight:600;min-height:1.1rem;transition:color .2s}
.adm-status.ok{color:var(--green)}
.adm-status.err{color:var(--red)}
.adm-status.checking{color:var(--accent)}
.adm-notif-preview{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;border-radius:var(--r-pill);border:1px solid var(--glass-border2);background:var(--glass);margin-top:.4rem}

async function exportCSV(){
  if(!spSb){toast('Supabase tidak tersambung',false);return;}
  try{
    var r=await spSb.from('sp_comments').select('*').order('created_at',{ascending:false}).limit(1000);
    if(r.error)throw r.error;
    if(!r.data||!r.data.length){toast('Tidak ada komentar',false);return;}
    var cols=['id','release_tag','display_name','is_anonymous','text','created_at','user_id'];
    var lines=[cols.join(',')];
    r.data.forEach(function(d){lines.push(cols.map(function(k){var v=d[k]===null||d[k]===undefined?'':String(d[k]);if(v.indexOf(',')>-1||v.indexOf('"')>-1||v.indexOf('\n')>-1)v='"'+v.replace(/"/g,'""')+'"';return v;}).join(','));});
    var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='snapperf_comments_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('\u2713 CSV diekspor ('+r.data.length+' baris)',true);
  }catch(e){toast('\u2717 Export gagal: '+(e.message||''),false);}
}

  var meta=loadTokenMeta();
  var sbJwt=decodeJWT(SP_SB_ANON);
  var sbExpMs=sbJwt&&sbJwt.exp?(sbJwt.exp*1000):null;

  // Refresh rate limit + token expiry from GitHub
  try{
    var rlRes=await fetch('https://api.github.com/rate_limit',{headers:ghHeaders()});
    if(rlRes.ok){
      var headerExp=rlRes.headers.get('github-authentication-token-expiration');
      var rlData=await rlRes.json();
      var core=rlData.resources&&rlData.resources.core;
      if(core){
        // Parse expiry: header takes priority, then stored meta, then try token decode
        var expiryVal=headerExp||((meta&&meta.expiry)||null);
        // For fine-grained tokens (github_pat_) they return expiry header
        // For classic tokens (ghp_) expiry header is null if no expiry set
        if(!expiryVal&&spToken){
          // Try to get token meta from /user endpoint headers
          try{
            var uRes=await fetch('https://api.github.com/user',{headers:ghHeaders()});
            if(uRes.ok){
              var uExp=uRes.headers.get('github-authentication-token-expiration');
              if(uExp)expiryVal=uExp;
            }
          }catch(e){}
        }
        meta={
          rateRemain:core.remaining,
          rateLimit:core.limit,
          rateReset:core.reset*1000,
          verifiedAt:now,
          expiry:expiryVal
        };
        saveTokenMeta(meta);
      }
    }
  }catch(e){}

  var sbCmtCount=0,sbLikeCount=0,sbConnected=false;
  try{
    var sc=await spSb.from('sp_comments').select('id',{count:'exact',head:true});
    var sl=await spSb.from('sp_likes').select('user_id',{count:'exact',head:true});
    sbCmtCount=sc.count||0;sbLikeCount=sl.count||0;sbConnected=true;
  }catch(e){}

  var ghStars=0,ghForks=0,ghIssues=0,ghDesc='',ghBranch='main';
  try{
    var gr=await fetch('https://api.github.com/repos/'+SP_GH_REPO,{headers:ghHeaders()});
    if(gr.ok){
      var gd=await gr.json();
      ghStars=gd.stargazers_count||0;ghForks=gd.forks_count||0;

  function row(lbl,val){

  // Token expiry — display time remaining (accurate)

  if(meta&&meta.expiry){

      if(exLeft<0){

  if(meta){html+='<div class="adm-prog-wrap"><div class="adm-prog-bar" style="width:'+ratePct+'%;background:'+rateColor+'"></div></div>';}
  html+='</div>';

  // GitHub Account card
  html+='<div class="adm-card-title" style="margin-top:.9rem"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> Akun GitHub</div>';
  html+='<div class="adm-lic-card">';

(function(){

  function showLocked(left){
    sub.disabled=true;
    var mins=Math.ceil(left/60000);
    st.className='lock-status err';
    st.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2"/></svg> Terkunci '+mins+' menit. Terlalu banyak percobaan.';
    inp.disabled=true;
    var t=setInterval(function(){var r=getLockoutLeft();if(r<=0){clearInterval(t);sub.disabled=false;inp.disabled=false;st.className='lock-status';st.textContent='';resetAttempts();}else{var m=Math.ceil(r/60000);st.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2"/></svg> Terkunci '+m+' menit';}},5000);
  }
  var lockoutLeft=getLockoutLeft();
  if(lockoutLeft>0){showLocked(lockoutLeft);}
  else{
    var saved=loadToken();
    if(saved){
      inp.value=saved;st.className='lock-status checking';
      st.innerHTML='<div class="adm-spin" style="width:13px;height:13px;border-width:1.5px"></div> Memverifikasi token tersimpan...';
      sub.disabled=true;var card=document.getElementById('lock-card');if(card)card.classList.add('lock-loading');
      verifyToken(saved).then(function(d){
        if(card)card.classList.remove('lock-loading');
        if(d){resetAttempts();initApp(saved,d);}
        else{clearToken();inp.value='';st.className='lock-status err';st.innerHTML='\u2717 Token kadaluarsa. Masukkan ulang.';sub.disabled=false;}
      });
    }
  }
  eye.addEventListener('click',function(){var s=inp.type==='password';inp.type=s?'text':'password';eye.innerHTML=s?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>';});
  async function doLogin(){
    if(isLocked()){showLocked(getLockoutLeft());return;}
    var t=inp.value.trim();
    if(!t){inp.classList.add('sp-shake');setTimeout(function(){inp.classList.remove('sp-shake');},400);return;}
    sub.disabled=true;var card=document.getElementById('lock-card');if(card)card.classList.add('lock-loading');
    st.className='lock-status checking';st.innerHTML='<div class="adm-spin" style="width:13px;height:13px;border-width:1.5px"></div> Memverifikasi...';
    var delay=new Promise(function(res){setTimeout(res,600+Math.random()*400);});
    var verify=verifyToken(t);
    var results=await Promise.all([verify,delay]);
    var d=results[0];
    if(d){
      if(card)card.classList.remove('lock-loading');
      resetAttempts();
      saveToken(t);saveOwner(d);initApp(t,d);
    }else{
      if(card)card.classList.remove('lock-loading');
      incAttempts();

      if(attempts>=MAX_ATTEMPTS){setLockout();showLocked(LOCKOUT_MS);}
      else{st.className='lock-status err';st.textContent='\u2717 Token tidak valid. ('+(MAX_ATTEMPTS-attempts)+' percobaan tersisa)';sub.disabled=false;}
    }
  }
  sub.addEventListener('click',doLogin);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doLogin();}});
})();

    // saveUpdateJson
    async function saveUpdateJson(ver,direct,mirror,cl,statusEl){
      if(!ver){toast('Versi wajib diisi',false);return false;}
      if(!direct&&!mirror){toast('Minimal satu URL download wajib diisi',false);return false;}
      if(statusEl){statusEl.className='adm-status checking';statusEl.textContent='Menyimpan ke GitHub...';}
      try{
        var apiUrl='https://api.github.com/repos/'+SP_GH_REPO+'/contents/server/update.json';
        var getR=await fetch(apiUrl,{headers:ghHeaders()});
        if(!getR.ok)throw new Error('Gagal baca update.json ('+getR.status+')');
        var gd=await getR.json();
        var sha=gd.sha;
        var cur={};
        try{cur=JSON.parse(atob(gd.content.replace(/\n/g,'')));}catch(e){}
        var payload={
          version:ver,
          versionCode:ver.replace(/\D/g,'').slice(0,8)||'10000',
          urlZip:direct||'',
          zipUrl:direct||'',
          link:mirror||'',
          changelog:cl||cur.changelog||''
        };
        var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
        var putR=await fetch(apiUrl,{
          method:'PUT',
          headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),
          body:JSON.stringify({
            message:'chore: update version to '+ver+' [skip ci]',
            content:encoded,
            sha:sha
          })
        });
        if(!putR.ok)throw new Error('Gagal simpan ('+putR.status+')');
        if(statusEl){statusEl.className='adm-status ok';statusEl.textContent='✓ update.json disimpan! Aktif ~30 detik.';}
        toast('✓ '+ver+' diupdate',true);
        return true;
      }catch(e){
        if(statusEl){statusEl.className='adm-status err';statusEl.textContent='✗ '+e.message;}
        toast('✗ '+e.message,false);
        return false;
      }
    }

    // uploadZipAsset via XHR to GitHub Uploads API
    async function uploadZipAsset(releaseId,file,releaseTag){
      var barEl=document.getElementById('nr-bar');
      var barWrap=document.getElementById('nr-bar-wrap');
      if(barWrap) barWrap.classList.add('visible');
      if(uploadStatus) uploadStatus.textContent='Membaca file...';

      // Progress
      var progVal=0,progTimer=null;
      function startProg(label){
        if(barEl) barEl.style.width='5%';
        progTimer=setInterval(function(){
          progVal=Math.min(progVal+4,88);
          if(barEl) barEl.style.width=progVal+'%';
          if(uploadStatus) uploadStatus.textContent=(label||'Uploading')+': '+progVal+'%';
        },200);
      }
      function stopProg(){clearInterval(progTimer);if(barEl)barEl.style.width='100%';}

      // Encode file ke base64
      var buffer=await file.arrayBuffer();
      var bytes=new Uint8Array(buffer);
      // Chunk btoa untuk file besar
      var binary='';
      var chunkSize=8192;
      for(var i=0;i<bytes.length;i+=chunkSize){
        binary+=String.fromCharCode.apply(null,bytes.subarray(i,Math.min(i+chunkSize,bytes.length)));
      }
      var base64=btoa(binary);

      // Path di repo: releases/{tag}/{filename}
      var safeTag=(releaseTag||'unknown').replace(/[^a-zA-Z0-9._-]/g,'_');
      var safeFilename=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var filePath='releases/'+safeTag+'/'+safeFilename;
      var apiUrl='https://api.github.com/repos/'+SP_GH_REPO+'/contents/'+filePath;

      // Cek SHA kalau file sudah ada
      var sha=null;
      try{
        var chk=await fetch(apiUrl,{headers:{'Authorization':'Bearer '+spToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}});
        if(chk.ok){var cd=await chk.json();sha=cd.sha;}
      }catch(ex){}

      if(uploadStatus) uploadStatus.textContent='Uploading ke GitHub...';
      startProg('Upload');

      var reqBody={
        message:'release: add asset '+safeFilename+' for '+safeTag+' [skip ci]',
        content:base64
      };
      if(sha) reqBody.sha=sha;

      var putRes=await fetch(apiUrl,{
        method:'PUT',
        headers:{
          'Authorization':'Bearer '+spToken,
          'Content-Type':'application/json',
          'Accept':'application/vnd.github+json',
          'X-GitHub-Api-Version':'2022-11-28'
        },
        body:JSON.stringify(reqBody)
      });

      stopProg();

      if(!putRes.ok){
        var ed={};try{ed=await putRes.json();}catch(ex){}
        var errMsg='Upload gagal HTTP '+putRes.status+': '+(ed.message||putRes.statusText);
        if(uploadStatus) uploadStatus.textContent='✗ '+errMsg;
        throw new Error(errMsg);
      }

      var putData=await putRes.json();

      // URL download file: pakai github.com raw download (bukan raw.githubusercontent untuk binary)
      // Format: https://github.com/{owner}/{repo}/raw/main/{path}
      // Ini support redirect dan proper content-type untuk binary files
      var dlUrl='https://github.com/'+SP_GH_REPO+'/raw/main/'+filePath;
      // Alternatif canonical: https://raw.githubusercontent.com/{owner}/{repo}/main/{path}
      var rawUrl=(putData.content&&putData.content.download_url)||'https://raw.githubusercontent.com/'+SP_GH_REPO+'/main/'+filePath;

      if(uploadStatus) uploadStatus.textContent='✓ Upload selesai! '+safeFilename;

      return {
        browser_download_url: dlUrl,
        raw_url: rawUrl,
        name: file.name,
        path: filePath,
        _via_contents: true
      };
    }

    // createRelease
    async function createRelease(name,tag,body,isPre){
      var cleanTag=tag.trim().replace(/[^\w\-\.\/]/g,'-').replace(/-{2,}/g,'-').replace(/^[-\.]+|[-\.]+$/g,'');
      if(!cleanTag) throw new Error('Tag tidak valid, contoh: v1.5.4-stable');
      var res=await fetch('https://api.github.com/repos/'+SP_GH_REPO+'/releases',{
        method:'POST',
        headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),
        body:JSON.stringify({tag_name:cleanTag,name:name,body:body||'',prerelease:isPre,draft:false})
      });
      if(!res.ok){
        var ed=await res.json().catch(function(){return{};});
        if(res.status===422){
          var errs=(ed.errors||[]).map(function(e){return e.code+' pada '+e.field;}).join('; ');
          throw new Error('Validasi gagal: '+(errs||ed.message||'422')+'. Tag "'+cleanTag+'" mungkin sudah ada.');
        }
        throw new Error('Gagal buat release: '+(ed.message||res.status));
      }
      return await res.json();
    }

    // deleteRelease
    async function deleteRelease(releaseId,tag){
      var res=await fetch('https://api.github.com/repos/'+SP_GH_REPO+'/releases/'+releaseId,{method:'DELETE',headers:ghHeaders()});
      if(!res.ok&&res.status!==404) throw new Error('Gagal hapus release: HTTP '+res.status);
      try{
        await fetch('https://api.github.com/repos/'+SP_GH_REPO+'/git/refs/tags/'+encodeURIComponent(tag),{method:'DELETE',headers:ghHeaders()});
      }catch(e){}
    }

    // submitNewRelease
    async function submitNewRelease(jsonOnly){
      var name=(document.getElementById('nr-name').value||'').trim();
      var tag=(document.getElementById('nr-tag').value||'').trim();
      var desc=(document.getElementById('nr-desc').value||'').trim();
      var direct=(document.getElementById('nr-direct').value||'').trim();
      var mirror=(document.getElementById('nr-mirror').value||'').trim();
      var cl=(document.getElementById('nr-cl').value||'').trim();
      var isPre=document.getElementById('nr-prerelease').checked;
      var st=document.getElementById('nr-st');

      if(!tag){toast('Tag versi wajib diisi',false);return;}
      if(!jsonOnly&&!name){toast('Nama Rilis wajib diisi',false);return;}

      if(st){st.className='adm-status checking';st.textContent='Memproses...';}
      setStep(3);

      if(!jsonOnly){
        try{
          // Build description (include mirror for per-release tracking)
          var fullDesc=desc;
          // Mirror disimpan sebagai HTML comment di body release → tidak tampil di GitHub UI
          // tapi tetap bisa di-parse oleh website
          if(mirror) fullDesc=desc+((desc&&desc.trim())?'\n\n':'')+'<!-- [mirror]: '+mirror+' -->';

          if(st) st.textContent='① Membuat GitHub Release...';
          var relData=await createRelease(name,tag,fullDesc,isPre);
          var createdTag=relData.tag_name||tag; // use actual tag from GitHub response

          if(st) st.textContent='✓ Release dibuat (tag: '+createdTag+')';

          // Upload ZIP file
          if(selectedFile){
            if(st) st.textContent='② Mengupload '+selectedFile.name+'...';
            try{
              var asset=await uploadZipAsset(relData.id,selectedFile,createdTag);
              // browser_download_url = https://github.com/{owner}/{repo}/releases/download/{tag}/{filename}
              var uploadedUrl=asset.browser_download_url||'';
              if(uploadedUrl){
                direct=uploadedUrl;
                var diEl=document.getElementById('nr-direct');
                if(diEl) diEl.value=direct;
                if(st) st.textContent='✓ Upload selesai: '+uploadedUrl;

                // Update release body dengan link download file
                if(asset._via_contents){
                  try{
                    var relApiUrl='https://api.github.com/repos/'+SP_GH_REPO+'/releases/'+relData.id;
                    var curBody=relData.body||'';
                    var fileLink='\n\n📦 **Download**: ['+esc(file.name)+']('+uploadedUrl+')';
                    await fetch(relApiUrl,{
                      method:'PATCH',
                      headers:Object.assign({'Content-Type':'application/json'},ghHeaders()),
                      body:JSON.stringify({body:curBody+fileLink})
                    });
                  }catch(ex){console.warn('Update release body gagal:',ex);}
                }
              }else{
                toast('⚠ File terupload tapi URL tidak ditemukan, cek GitHub.',false);
              }
            }catch(upErr){
              toast('⚠ Upload gagal: '+upErr.message,false);
              if(st){st.className='adm-status err';st.textContent='✗ Upload gagal: '+upErr.message;}
              return; // Stop — don't save wrong URL
            }
          }

          if(!direct){
            toast('⚠ Direct link kosong. Upload file .zip atau isi manual.',false);
            if(st){st.className='adm-status err';st.textContent='✗ Tidak ada direct link';}
            return;
          }

        }catch(e){
          if(st){st.className='adm-status err';st.textContent='✗ '+e.message;}
          toast('✗ '+e.message,false);
          setStep(1);
          return;
        }
      }

      // Save to update.json
      var ver=name||tag;
      if(st) st.textContent='③ Menyimpan update.json...';
      var ok=await saveUpdateJson(ver,direct,mirror,cl,jsonOnly?st:null);
      if(ok||jsonOnly){
        if(st){st.className='adm-status ok';st.textContent=jsonOnly?'✓ update.json diupdate!':'✓ Release dipublish! Direct: '+direct;}
        selectedFile=null;
        setStep(1);
        if(fileLabelText) fileLabelText.textContent='Pilih File .zip…';
        if(fileLabel){fileLabel.style.borderColor='';fileLabel.style.color='';}
        if(fileInput) fileInput.value='';
        var bw=document.getElementById('nr-bar-wrap');if(bw) bw.classList.remove('visible');
        var bb=document.getElementById('nr-bar');if(bb) bb.style.width='0';
        if(uploadStatus) uploadStatus.textContent='';
        // Clear cache so archive table shows new release with assets
        try{sessionStorage.removeItem('sp_releases_v2');sessionStorage.removeItem('sp_releases_ts_v2');localStorage.removeItem('sp_releases_v2');localStorage.removeItem('sp_releases_ts_v2');}catch(_e){}
        setTimeout(function(){renderReleases();},1500);
      }
    }

    // Wire buttons
    document.getElementById('nr-submit').addEventListener('click',function(){submitNewRelease(false);});
    document.getElementById('nr-only-json').addEventListener('click',function(){submitNewRelease(true);});
    document.getElementById('nr-reset').addEventListener('click',function(){
      ['nr-name','nr-tag','nr-desc','nr-direct','nr-mirror','nr-cl'].forEach(function(id){
        var el=document.getElementById(id);if(el) el.value='';
      });
      selectedFile=null;
      if(fileLabelText) fileLabelText.textContent='Pilih File .zip…';
      if(fileLabel){fileLabel.style.borderColor='';fileLabel.style.color='';}
      if(fileInput) fileInput.value='';
      var bw=document.getElementById('nr-bar-wrap');if(bw) bw.classList.remove('visible');
      var bb=document.getElementById('nr-bar');if(bb) bb.style.width='0';
      if(uploadStatus) uploadStatus.textContent='';
      var st=document.getElementById('nr-st');if(st){st.className='adm-status';st.textContent='';}
      setStep(1);
    });

    document.getElementById('rel-save').addEventListener('click',async function(){
      await saveUpdateJson(
        document.getElementById('rel-ver').value.trim(),
        document.getElementById('rel-direct').value.trim(),
        document.getElementById('rel-mirror').value.trim(),
        document.getElementById('rel-cl2').value.trim(),
        document.getElementById('rel-st')
      );
    });

    // Fill form from existing release
    pg.querySelectorAll('.adm-fill-release').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.getElementById('nr-tag').value=btn.dataset.tag||'';
        document.getElementById('nr-name').value=btn.dataset.name||'';
        document.getElementById('nr-prerelease').checked=btn.dataset.pre==='true';
        var dlUrl=btn.dataset.dlurl||'';
        var diEl=document.getElementById('nr-direct');
        if(diEl) diEl.value=dlUrl;
        var mirEl=document.getElementById('nr-mirror');
        if(mirEl) mirEl.value=btn.dataset.mirror||'';
        document.getElementById('nr-name').scrollIntoView({behavior:'smooth',block:'center'});
        toast('Form diisi dari: '+btn.dataset.tag+(dlUrl?' | Direct: '+dlUrl.split('/').pop():''),true);
      });
    });

    // Delete release
    pg.querySelectorAll('.adm-del-release').forEach(function(btn){
      btn.addEventListener('click',async function(){
        var relId=btn.dataset.id,relTag=btn.dataset.tag;
        if(!confirm('Hapus release "'+relTag+'"?\nTidak bisa dibatalkan!')){return;}
        btn.disabled=true;btn.textContent='...';
        try{
          await deleteRelease(relId,relTag);
          toast('✓ Release '+relTag+' dihapus',true);
          setTimeout(function(){renderReleases();},600);
        }catch(e){
          btn.disabled=false;btn.textContent='🗑';
          toast('✗ '+e.message,false);
        }
      });
    });

  }catch(e){
    pg.innerHTML='<div class="adm-err">Gagal memuat rilis: '+esc(e.message||'')+'</div>';
  }
}

</script>
</body>
